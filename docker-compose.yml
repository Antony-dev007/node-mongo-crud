services:
  mongodb:
    image: mongo:latest
    container_name: user
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: pass123
    volumes:
      - mongodb_data:/data/db
volumes:
  mongodb_data:
    driver: local
